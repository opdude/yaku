name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake glslc libvulkan-dev spirv-headers g++ pkg-config file

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Compile whisper.cpp
        run: task whisper

      - name: Run tests
        run: task test
