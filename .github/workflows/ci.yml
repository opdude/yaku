name: CI

on:
  push:
    branches: [main, windows]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake glslc libvulkan-dev spirv-headers g++ pkg-config file

      - name: Compile whisper.cpp
        run: go tool task whisper

      - name: Run tests
        run: go tool task test

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MSYS2 MinGW-w64 Vulkan packages
        run: |
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-x86_64-vulkan-loader mingw-w64-x86_64-vulkan-headers mingw-w64-x86_64-shaderc mingw-w64-x86_64-spirv-tools mingw-w64-x86_64-spirv-headers"

      - name: Add MSYS2 MinGW-w64 tools to PATH
        run: |
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\msys64\usr\bin"     | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compile whisper.cpp (MinGW, Vulkan)
        run: go tool task whisper-windows
        env:
          CGO_ENABLED: "1"
          PKG_CONFIG_PATH: ${{ github.workspace }}/build/whisper/install/lib/pkgconfig
          CC: C:\msys64\mingw64\bin\gcc.exe
          CXX: C:\msys64\mingw64\bin\g++.exe

      - name: Run tests
        run: go tool task test-windows
        env:
          CGO_ENABLED: "1"
          PKG_CONFIG_PATH: ${{ github.workspace }}/build/whisper/install/lib/pkgconfig
          CC: C:\msys64\mingw64\bin\gcc.exe
          CXX: C:\msys64\mingw64\bin\g++.exe
