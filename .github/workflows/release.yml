name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    name: Build & release (Linux AppImage)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake glslc libvulkan-dev spirv-headers g++ pkg-config file \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Compile whisper.cpp
        run: task whisper

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: ${{ github.workspace }}/build/whisper/install/lib/pkgconfig

  release-windows:
    name: Build & upload Windows exe
    runs-on: windows-latest
    needs: release-linux  # wait for the GitHub Release to be created first

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Add MSYS2 MinGW-w64 tools to PATH
        run: |
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\msys64\usr\bin"     | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build whisper.cpp (MinGW, CPU)
        run: go tool task whisper-windows
        env:
          CGO_ENABLED: "1"
          PKG_CONFIG_PATH: ${{ github.workspace }}/build/whisper/install/lib/pkgconfig
          CC: C:\msys64\mingw64\bin\gcc.exe
          CXX: C:\msys64\mingw64\bin\g++.exe

      - name: Build Wails Windows exe
        run: go tool task build-windows
        env:
          CGO_ENABLED: "1"
          PKG_CONFIG_PATH: ${{ github.workspace }}/build/whisper/install/lib/pkgconfig
          CC: C:\msys64\mingw64\bin\gcc.exe
          CXX: C:\msys64\mingw64\bin\g++.exe

      - name: Upload Windows exe to GitHub Release
        run: gh release upload ${{ github.ref_name }} bin/yaku-ui.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
