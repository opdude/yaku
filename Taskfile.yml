version: "3"

# ── GPU mode ──────────────────────────────────────────────────────────────────
# Set GPU=vulkan (default), GPU=cuda, or GPU=cpu to control whisper.cpp backend.
# Windows builds support vulkan (default) and cpu; cuda can be added later.
#
# Build deps (Debian / Ubuntu):
#   sudo apt-get install cmake glslc libvulkan-dev libgomp-dev g++ pkg-config \
#                        libgtk-3-dev libwebkit2gtk-4.1-dev
#
# Build deps (Fedora / RHEL):
#   sudo dnf install cmake glslc vulkan-loader-devel libgomp-devel gcc-c++ pkgconf \
#                    gtk3-devel webkit2gtk4.1-devel
#
# Build deps (Windows) — requires MSYS2 with MinGW-w64:
#   pacman -S mingw-w64-x86_64-cmake mingw-w64-x86_64-gcc mingw-w64-x86_64-ninja \
#             mingw-w64-x86_64-pkgconf \
#             mingw-w64-x86_64-vulkan-loader mingw-w64-x86_64-vulkan-headers \
#             mingw-w64-x86_64-shaderc mingw-w64-x86_64-spirv-tools mingw-w64-x86_64-spirv-headers
#   (omit the last five lines if using GPU=cpu)
#
# Runtime deps (provided by the AppImage except WebKit and GStreamer):
#   libvulkan.so.1     (vulkan-loader)
#   libgomp.so.1       (libgomp)
#   libwebkit2gtk-4.1  (webkit2gtk4.1 / libwebkit2gtk-4.1-0)
#   parec / pactl      (pipewire-pulse or pulseaudio-utils)
# ─────────────────────────────────────────────────────────────────────────────

vars:
  GPU:              '{{.GPU | default "vulkan"}}'
  OUTPUT_DIR:       bin
  WHISPER_DIR:      third_party/whisper.cpp
  INSTALL_DIR:      build/whisper/install
  PKG_CONFIG_PATH:  "{{.ROOT_DIR}}/build/whisper/install/lib/pkgconfig"
  BINARY:           "{{.OUTPUT_DIR}}/yaku-ui"
  WAILS_DIR:        cmd/yaku
  MINGW:            '{{.MINGW | default "C:/msys64/mingw64"}}'

  # Pure Go-template expressions — no shell required on any platform.
  CMAKE_GPU_FLAGS: "{{if eq .GPU \"vulkan\"}}-DGGML_VULKAN=ON{{else if eq .GPU \"cuda\"}}-DGGML_CUDA=ON{{end}}"

  EXTRA_LIBS: "{{if eq .GPU \"vulkan\"}}-lggml-vulkan -lvulkan{{else if eq .GPU \"cuda\"}}-lggml-cuda{{end}}"

  VULKAN_LIB: "{{if eq .GPU \"vulkan\"}}{{.INSTALL_DIR}}/lib/libggml-vulkan.a{{end}}"

env:
  PKG_CONFIG_PATH: "{{.PKG_CONFIG_PATH}}"
  CGO_ENABLED:     "1"

tasks:
  # ── Main build (Linux / macOS) ────────────────────────────────────────────
  default:
    desc: "Build the Wails desktop app ({{.BINARY}}) — GPU={{.GPU}}"
    platforms: [linux, darwin]
    deps: [whisper, wails-cli]
    dir: "{{.WAILS_DIR}}"
    cmds:
      - mkdir -p ../../{{.OUTPUT_DIR}}
      - wails build -tags webkit2_41 -platform linux/amd64
      - mv build/bin/yaku-ui ../../{{.BINARY}}

  dev:
    desc: "Run in Wails dev mode (live-reload frontend)"
    platforms: [linux, darwin]
    deps: [whisper, wails-cli]
    dir: "{{.WAILS_DIR}}"
    cmds:
      - wails dev -tags webkit2_41

  dev-windows:
    desc: "Run in Wails dev mode on Windows (live-reload frontend)"
    platforms: [windows]
    deps: [whisper-windows, wails-cli]
    dir: "{{.WAILS_DIR}}"
    env:
      PATH: '{{.MINGW}}\bin;$PATH'
      CC:  "{{.MINGW}}/bin/gcc.exe"
      CXX: "{{.MINGW}}/bin/g++.exe"
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File ../../build/wails-windows.ps1 -Cmd dev -Mingw "{{.MINGW}}"

  wails-cli:
    desc: "Install the Wails CLI via go install (skipped if already present)"
    status:
      - wails version
    cmds:
      - go install github.com/wailsapp/wails/v2/cmd/wails@latest

  # ── whisper.cpp (Linux / macOS) ───────────────────────────────────────────
  submodule:
    desc: "Initialise git submodules (skipped when already checked out)"
    status:
      - test -f "{{.WHISPER_DIR}}/CMakeLists.txt"
    cmds:
      - git submodule update --init --recursive

  whisper:
    desc: "Compile whisper.cpp (GPU={{.GPU}}). Re-runs when GPU mode changes."
    platforms: [linux, darwin]
    deps: [submodule]
    vars:
      MARKER: "{{.INSTALL_DIR}}/.built-gpu-{{.GPU}}"
    status:
      - test -f "{{.INSTALL_DIR}}/lib/libwhisper.a"
      - test -f "{{.PKG_CONFIG_PATH}}/libwhisper.pc"
      - test -f "{{.MARKER}}"
      - |
        {{if .VULKAN_LIB}}test -f "{{.VULKAN_LIB}}"{{else}}true{{end}}
    cmds:
      - rm -f {{.INSTALL_DIR}}/.built-gpu-*
      # Remove the cmake build dir so a stale CMakeCache.txt from a previous
      # project path never prevents a clean configure.
      - rm -rf {{.WHISPER_DIR}}/build
      - cmake -S {{.WHISPER_DIR}} -B {{.WHISPER_DIR}}/build
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DWHISPER_BUILD_TESTS=OFF
          -DWHISPER_BUILD_EXAMPLES=OFF
          -DGGML_OPENMP=ON
          {{.CMAKE_GPU_FLAGS}}
      - cmake --build {{.WHISPER_DIR}}/build -j
      - mkdir -p {{.INSTALL_DIR}}/lib/pkgconfig {{.INSTALL_DIR}}/include
      - cp {{.WHISPER_DIR}}/include/whisper.h {{.INSTALL_DIR}}/include/
      - cp {{.WHISPER_DIR}}/ggml/include/*.h {{.INSTALL_DIR}}/include/
      - cp {{.WHISPER_DIR}}/build/src/libwhisper.a {{.INSTALL_DIR}}/lib/
      - cp {{.WHISPER_DIR}}/build/ggml/src/libggml.a {{.INSTALL_DIR}}/lib/
      - cp {{.WHISPER_DIR}}/build/ggml/src/libggml-base.a {{.INSTALL_DIR}}/lib/
      - cp {{.WHISPER_DIR}}/build/ggml/src/libggml-cpu.a {{.INSTALL_DIR}}/lib/
      - |
        if [ "{{.GPU}}" = "vulkan" ]; then
          cp {{.WHISPER_DIR}}/build/ggml/src/ggml-vulkan/libggml-vulkan.a {{.INSTALL_DIR}}/lib/
        fi
      - |
        cat > {{.PKG_CONFIG_PATH}}/libwhisper.pc << EOF
        prefix={{.ROOT_DIR}}/{{.INSTALL_DIR}}

        Name: libwhisper
        Description: Whisper speech recognition library
        Version: 1.8.4
        Cflags: -I\${prefix}/include
        EOF
      - |
        EXTRA="{{.EXTRA_LIBS}}"
        cat > {{.PKG_CONFIG_PATH}}/libwhisper-linux.pc << EOF
        prefix={{.ROOT_DIR}}/{{.INSTALL_DIR}}

        Name: libwhisper-linux
        Description: Whisper speech recognition library (Linux, GPU={{.GPU}})
        Version: 1.8.4
        Cflags: -fopenmp
        Libs: -L\${prefix}/lib -lwhisper -lggml -lggml-base -lggml-cpu $EXTRA -lgomp -lm -lstdc++
        EOF
      - touch {{.MARKER}}

  # ── whisper.cpp (Windows — MinGW-w64) ────────────────────────────────────────
  # Requires MSYS2 MinGW-w64 toolchain.  On GitHub Actions this is pre-installed
  # at C:\msys64\mingw64.  Override MINGW to use a different installation.
  # GPU=vulkan (default) requires mingw-w64-x86_64-vulkan-loader/headers/shaderc.
  whisper-windows:
    desc: "Compile whisper.cpp for Windows (GPU={{.GPU}}) using MinGW-w64"
    platforms: [windows]
    deps: [submodule]
    vars:
      MARKER: "{{.INSTALL_DIR}}/.built-windows-{{.GPU}}"
      WIN_VULKAN_LIB: "{{if eq .GPU \"vulkan\"}}{{.WHISPER_DIR}}/build/ggml/src/ggml-vulkan/ggml-vulkan.a{{end}}"
    status:
      - powershell -NoProfile -Command "if (Test-Path '{{.INSTALL_DIR}}/lib/libwhisper.a') { exit 0 } else { exit 1 }"
      - powershell -NoProfile -Command "if (Test-Path '{{.INSTALL_DIR}}/lib/pkgconfig/libwhisper.pc') { exit 0 } else { exit 1 }"
      - powershell -NoProfile -Command "if (Test-Path '{{.MARKER}}') { exit 0 } else { exit 1 }"
      - powershell -NoProfile -Command "if ('{{.WIN_VULKAN_LIB}}' -ne '' -and !(Test-Path '{{.INSTALL_DIR}}/lib/ggml-vulkan.a')) { exit 1 } else { exit 0 }"
    cmds:
      - cmd: powershell -NoProfile -Command "Remove-Item -Force '{{.INSTALL_DIR}}/.built-windows-*' -ErrorAction SilentlyContinue"
        ignore_error: true
      - cmd: powershell -NoProfile -Command "Remove-Item -Recurse -Force '{{.WHISPER_DIR}}/build' -ErrorAction SilentlyContinue"
        ignore_error: true
      - cmake -S {{.WHISPER_DIR}} -B {{.WHISPER_DIR}}/build
          -G Ninja
          "-DCMAKE_C_COMPILER={{.MINGW}}/bin/gcc.exe"
          "-DCMAKE_CXX_COMPILER={{.MINGW}}/bin/g++.exe"
          "-DCMAKE_PREFIX_PATH={{.MINGW}}"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DWHISPER_BUILD_TESTS=OFF
          -DWHISPER_BUILD_EXAMPLES=OFF
          -DGGML_OPENMP=ON
          {{.CMAKE_GPU_FLAGS}}
      - cmake --build {{.WHISPER_DIR}}/build -j
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force '{{.INSTALL_DIR}}/lib/pkgconfig','{{.INSTALL_DIR}}/include' | Out-Null"
      - cmd: powershell -NoProfile -Command "Copy-Item '{{.WHISPER_DIR}}/include/whisper.h' '{{.INSTALL_DIR}}/include/'"
      - cmd: powershell -NoProfile -Command "Copy-Item '{{.WHISPER_DIR}}/ggml/include/*.h' '{{.INSTALL_DIR}}/include/'"
      - cmd: powershell -NoProfile -Command "Copy-Item '{{.WHISPER_DIR}}/build/src/libwhisper.a','{{.WHISPER_DIR}}/build/ggml/src/ggml.a','{{.WHISPER_DIR}}/build/ggml/src/ggml-base.a','{{.WHISPER_DIR}}/build/ggml/src/ggml-cpu.a' '{{.INSTALL_DIR}}/lib/'"
      - cmd: powershell -NoProfile -Command "if ('{{.WIN_VULKAN_LIB}}' -ne '') { Copy-Item '{{.WIN_VULKAN_LIB}}','{{.MINGW}}/lib/libvulkan-1.dll.a' '{{.INSTALL_DIR}}/lib/' }"
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File build/write-pkgconfig-windows.ps1 -Prefix "{{.ROOT_DIR}}/{{.INSTALL_DIR}}" -PkgConfigDir "{{.ROOT_DIR}}/{{.INSTALL_DIR}}/lib/pkgconfig" -GPU "{{.GPU}}"
      - cmd: powershell -NoProfile -Command "New-Item -ItemType File -Force '{{.MARKER}}' | Out-Null"

  # ── Windows app build ─────────────────────────────────────────────────────
  build-windows:
    desc: "Build the Wails Windows exe (bin/yaku-ui.exe)"
    platforms: [windows]
    deps: [whisper-windows, wails-cli]
    dir: "{{.WAILS_DIR}}"
    env:
      PATH: '{{.MINGW}}\bin;$PATH'
      CC:  "{{.MINGW}}/bin/gcc.exe"
      CXX: "{{.MINGW}}/bin/g++.exe"
    cmds:
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force '../../{{.OUTPUT_DIR}}' | Out-Null"
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File ../../build/wails-windows.ps1 -Cmd "build -platform windows/amd64" -Mingw "{{.MINGW}}"
      - cmd: powershell -NoProfile -Command "Copy-Item 'build/bin/yaku-ui.exe' '../../{{.OUTPUT_DIR}}/yaku-ui.exe'"

  # ── AppImage packaging ────────────────────────────────────────────────────
  appimage:
    desc: "Build an AppImage (GPU={{.GPU}}). Output: bin/yaku-<version>-linux-x86_64.AppImage"
    platforms: [linux]
    cmds:
      - GPU={{.GPU}} bash build/build-appimage.sh

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    desc: Run unit tests (Linux/macOS)
    platforms: [linux, darwin]
    deps: [whisper]
    cmds:
      - go test ./internal/... -timeout 120s {{.CLI_ARGS}}

  test-verbose:
    desc: Run unit tests with verbose output (Linux/macOS)
    platforms: [linux, darwin]
    deps: [whisper]
    cmds:
      - go test ./internal/... -v -timeout 120s {{.CLI_ARGS}}

  test-integration:
    desc: "Transcription integration test (set WHISPER_MODEL_REAL=<path>)"
    platforms: [linux, darwin]
    deps: [whisper]
    cmds:
      - go test ./internal/transcribe/ -v -run TestTranscribe_GermanAudio -timeout 120s

  test-windows:
    desc: "Run unit tests on Windows (excludes transcribe — requires whisper-windows first)"
    platforms: [windows]
    deps: [whisper-windows]
    env:
      PATH: '{{.MINGW}}\bin;$PATH'
      CC:  "{{.MINGW}}/bin/gcc.exe"
      CXX: "{{.MINGW}}/bin/g++.exe"
    cmds:
      - go test ./internal/audio/... ./internal/config/... ./internal/translate/... -timeout 120s {{.CLI_ARGS}}

  # ── Maintenance ───────────────────────────────────────────────────────────
  tidy:
    desc: Run go mod tidy
    platforms: [linux, darwin]
    deps: [whisper]
    cmds:
      - go mod tidy

  clean:
    desc: Remove compiled binary
    platforms: [linux, darwin]
    cmds:
      - rm -f {{.BINARY}}

  clean-windows:
    desc: Remove compiled Windows binary and whisper libs
    platforms: [windows]
    cmds:
      - cmd: powershell -NoProfile -Command "Remove-Item -Force '{{.OUTPUT_DIR}}/yaku-ui.exe' -ErrorAction SilentlyContinue"
      - cmd: powershell -NoProfile -Command "Remove-Item -Recurse -Force '{{.WHISPER_DIR}}/build','{{.INSTALL_DIR}}' -ErrorAction SilentlyContinue"

  clean-all:
    desc: Remove binary and all compiled whisper libs (forces full rebuild next run)
    platforms: [linux, darwin]
    cmds:
      - rm -f {{.BINARY}}
      - rm -rf {{.WHISPER_DIR}}/build {{.INSTALL_DIR}}
