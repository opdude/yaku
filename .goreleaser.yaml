version: 2

project_name: yaku

# Wails apps cannot be built with plain `go build` — the frontend assets must
# be embedded and CGO must be configured against the compiled whisper.cpp libs.
# The Linux AppImage is produced by task appimage (called in the before hook).
# The Windows exe is built separately by the release-windows CI job and uploaded
# to the GitHub Release via `gh release upload`.
before:
  hooks:
    - go mod tidy
    - sh -c 'GPU=vulkan bash build/build-appimage.sh'

# No standard Go builds — output is produced entirely by the before hooks above.
builds:
  - skip: true
    binary: yaku
    goos: [linux]
    goarch: [amd64]

# No archives — the AppImage and Windows exe are self-contained.
archives: []

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: opdude
    name: yaku
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  extra_files:
    - glob: "bin/yaku-*-linux-x86_64.AppImage"
    - glob: "bin/yaku-ui.exe"
  footer: |
    ## Installation

    ### Linux
    Download the `.AppImage` and make it executable:
    ```bash
    chmod +x yaku-*.AppImage
    ./yaku-*.AppImage
    ```

    ### Windows
    Download `yaku-ui.exe` and run it directly.
    WebView2 Runtime is required — it is pre-installed on Windows 11 and
    available from [Microsoft](https://developer.microsoft.com/microsoft-edge/webview2/).

    **Requirements (both platforms):**
    - [Ollama](https://ollama.com) running locally with a translation model:
      ```bash
      ollama pull translategemma:4b
      ```
    - A whisper model file — point Settings → Model Path at an existing `.bin` file.

    **Linux only:**
    - `libvulkan.so.1` (vulkan-loader) for GPU acceleration
